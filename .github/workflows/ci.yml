name: CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  GCP_REGION: ${{ secrets.GCP_REGION }}
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGISTRY: europe-west1-docker.pkg.dev
  IMAGE_BACKEND: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/devops-todo/backend
  IMAGE_FRONTEND: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/devops-todo/frontend

jobs:
  # ============================================================
  # JOB 1 — BACKEND QUALITY & SECURITY
  # ============================================================
  backend-ci:
    name: Backend — Lint, Test, Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run ESLint
        working-directory: backend
        run: npm run lint

      - name: Run tests with coverage
        working-directory: backend
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: backend
          args: >
            -Dsonar.organization=med-aziz-daira
            -Dsonar.projectKey=Med-Aziz-Daira_devops-todo
            -Dsonar.sources=src
            -Dsonar.exclusions=src/__tests__/**
            -Dsonar.tests=src/__tests__
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

      - name: Semgrep SAST Scan
        run: |
          pip install semgrep
          semgrep scan \
            --config p/nodejs \
            --config p/secrets \
            --config p/owasp-top-ten \
            --error \
            backend/src

      - name: Dependency vulnerability scan
        working-directory: backend
        run: |
          npm audit --audit-level=critical
          echo "Dependency scan complete"

  # ============================================================
  # JOB 2 — FRONTEND QUALITY
  # ============================================================
  frontend-ci:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npx eslint src/ --ext .js,.jsx --max-warnings=0

      - name: Build React app
        working-directory: frontend
        run: npm run build
        env:
          REACT_APP_API_URL: /api/tasks

  # ============================================================
  # JOB 3 — DOCKER BUILD + SECURITY SCAN + PUSH TO GCP
  # ============================================================
  docker-build-push:
    name: Docker — Build, Trivy Scan, Push
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for GCP Artifact Registry
        run: |
          gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Set image tag
        id: tag
        run: echo "TAG=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build backend image
        run: |
          docker build \
            -f docker/Dockerfile.backend \
            -t ${{ env.IMAGE_BACKEND }}:${{ steps.tag.outputs.TAG }} \
            -t ${{ env.IMAGE_BACKEND }}:latest \
            .

      - name: Trivy scan — backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_BACKEND }}:${{ steps.tag.outputs.TAG }}
          format: table
          exit-code: '1'
          severity: CRITICAL
          vuln-type: os,library

      - name: Build frontend image
        run: |
          docker build \
            -f docker/Dockerfile.frontend \
            -t ${{ env.IMAGE_FRONTEND }}:${{ steps.tag.outputs.TAG }} \
            -t ${{ env.IMAGE_FRONTEND }}:latest \
            .

      - name: Trivy scan — frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_FRONTEND }}:${{ steps.tag.outputs.TAG }}
          format: table
          exit-code: '1'
          severity: CRITICAL
          vuln-type: os,library

      - name: Push backend image to Artifact Registry
        run: |
          docker push ${{ env.IMAGE_BACKEND }}:${{ steps.tag.outputs.TAG }}
          docker push ${{ env.IMAGE_BACKEND }}:latest

      - name: Push frontend image to Artifact Registry
        run: |
          docker push ${{ env.IMAGE_FRONTEND }}:${{ steps.tag.outputs.TAG }}
          docker push ${{ env.IMAGE_FRONTEND }}:latest

      - name: Summary
        run: |
          echo "### ✅ CI Pipeline Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| backend | ${{ steps.tag.outputs.TAG }} |" >> $GITHUB_STEP_SUMMARY
          echo "| frontend | ${{ steps.tag.outputs.TAG }} |" >> $GITHUB_STEP_SUMMARY
